<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fancy Counter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="counter">
        <h1 class="counter_title">Fancy Counter</h1>
        <span class="counter_value">0</span>
        <button class="counter_reset-button">
            <i class="fa-solid fa-arrows-rotate counter_reset-icon"></i>
        </button>
        <div class="counter_buttons">
        <button class="counter_button counter_button--decrease">
            <i class="fa-solid fa-minus counter_icon counter_icon--minus"></i>
        </button>
        <button class="counter_button counter_button--increase">
            <i class="fa-solid fa-plus counter_icon counter_icon--plus"></i>
        </button>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
